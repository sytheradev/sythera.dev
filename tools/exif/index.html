<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#000">
    
    <meta property="og:site_name" content="exif/">
    <meta property="og:description" content="Hello, world! UVIgY29kZQ==">
    <meta property="og:image:width" content="1920">
    <meta property="og:image:height" content="1080">
    <meta property="og:image" content="libraries/yeah.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="libraries/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="libraries/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="libraries/icons/favicon-16x16.png">
    <link rel="manifest" href="libraries/icons/site.webmanifest">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/background.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/media.css">
    <link rel="stylesheet" href="../../assets/css/tools-layout.css">
    <link rel="stylesheet" href="../../assets/css/tools-modal.css">
    <script src="../../assets/javascript/background.js"></script>
    <script src="../../keybindings.js"></script>
    <script src="../../assets/javascript/language.js"></script>
    <script src="../../assets/javascript/tools-modal.js"></script>
    <script src="assets/javascript/script.js"></script>
    <script src="libraries/javascript/exif-reader.min.js"></script>
    <title>Remove EXIF Metadata</title>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div class="pixels"></div>
    <div class="grid"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="floating-shapes">
        <div class="shape shape-ring shape-1"></div>
        <div class="shape shape-ring shape-2"></div>
        <div class="shape shape-triangle shape-3"></div>
        <div class="shape shape-square shape-4"></div>
    </div>

    <div class="wrapper">
        <div class="container">
        <h1>EXIF Metadata Remover</h1>

        <div class="file-input-container">
            <div class="file-input">
                <input type="file" id="imageInput" accept="image/*" class="file-input-field">
                <div class="button-container" hidden>
                    <button id="removeExifButton" class="upload-button" hidden>Remove EXIF</button>
                </div>
            </div>
            <div class="output-container" id="outputContainer">
                <p id="outputMessage"></p>
                <div id="imagePreviewContainer" class="image-preview-container">
                    <img id="imagePreview" class="image-preview" style="display: none;" />
                    <div id="noImageMessage" class="no-image-message">No image selected</div>
                </div>
                <div id="downloadContainer" class="button-container"></div>

            </div>
        </div>

        <div class="exif-info" id="exifInfo" style="display: none;">
            <h3>Removable Metadata:</h3>
            <div class="exif-table-wrapper">
                <table id="exifTable">
                    <thead>
                        <tr>
                            <th>Tag</th>
                            <th>Value</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="exifData"></tbody>
                </table>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
