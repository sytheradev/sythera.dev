<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#000">

    <meta property="og:site_name" content="translate/">
    <meta property="og:description" content="Hello, world! UVIgY29kZQ==">
    <meta property="og:image:width" content="1920">
    <meta property="og:image:height" content="1080">
    <meta property="og:image" content="libraries/yeah.png">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="libraries/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="libraries/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="libraries/icons/favicon-16x16.png">
    <link rel="manifest" href="libraries/icons/site.webmanifest">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/background.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/media.css">
    <link rel="stylesheet" href="../../assets/css/tools-layout.css">
    <link rel="stylesheet" href="../../assets/css/tools-modal.css">

    <script src="../../assets/javascript/background.js"></script>
    <script src="../../keybindings.js"></script>
    <script src="../../assets/javascript/language.js"></script>
    <script src="../../assets/javascript/tools-modal.js"></script>
    <script src="assets/javascript/script.js"></script>
    
    <title>Text Translator</title>
</head>

<body class="tool-translate">
    <canvas id="canvas"></canvas>
    <div class="pixels"></div>
    <div class="grid"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="floating-shapes">
        <div class="shape shape-ring shape-1"></div>
        <div class="shape shape-ring shape-2"></div>
        <div class="shape shape-triangle shape-3"></div>
        <div class="shape shape-square shape-4"></div>
    </div>

    <div id="errorNotification" class="notification error">
        <span id="errorMessage"></span>
        <button class="closeButton">×</button>
    </div>
    <div class="wrapper">
        <div class="container">
            <div class="textarea-row">

                <div class="textarea-container">
                    <div class="textarea-overlay">
                        <textarea id="inputText" placeholder="Enter text..."></textarea>
                        <div class="icon-button">
                            <img src="libraries/svg/clearTextButton.svg" id="clearTextButton">
                        </div>
                        <span id="charCount">0/5000 characters</span>
                    </div>
                </div>

                <div class="textarea-container">
                    <div class="textarea-overlay">
                        <textarea id="outputText" placeholder="Translation result..." readonly></textarea>
                        <div class="icon-button">
                            <img src="libraries/svg/copyTextButton.svg" id="copyTextButton">
                        </div>
                    </div>
                </div>
            </div>

            <div class="buttonContainer">
                <div class="custom-select-wrapper">
                    <select id="sourceLang" style="display: none;"></select>
                    <div class="custom-select" id="customSourceLangSelect">
                        <div class="custom-select-trigger">
                            <input type="text" class="custom-select-input" placeholder="Search or enter code..." value="English">
                            <span class="custom-select-arrow">▼</span>
                        </div>
                        <div class="custom-select-options"></div>
                    </div>
                </div>
                <button id="swapButton" class="icon-button"><img src="libraries/svg/horizSwapButton.svg" id="horizSwapButton"></button>
                <div class="custom-select-wrapper">
                    <select id="targetLang" style="display: none;"></select>
                    <div class="custom-select" id="customTargetLangSelect">
                        <div class="custom-select-trigger">
                            <input type="text" class="custom-select-input" placeholder="Search or enter code..." value="Russian">
                            <span class="custom-select-arrow">▼</span>
                        </div>
                        <div class="custom-select-options"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
